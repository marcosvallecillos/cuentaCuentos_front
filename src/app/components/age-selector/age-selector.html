<div class="age-selector-container">
  <div class="stars-overlay"></div>
  <div class="wizard-wrap">
    <div class="wizard-container">
      <img src="../../images/friendly_wizard.png" alt="Friendly Wizard" class="friendly-wizard-img" />
    </div>
  </div>

  <div class="content-wrap">
    <h2 class="panel-title wizard-title">What is your magical age?</h2>
    <p class="subtitle">Enter a number like 6, then tap Done to begin</p>

    <div class="age-input-group">
      <input 
        type="number" 
        [(ngModel)]="selectedAge" 
        min="3" 
        max="12" 
        class="age-number-input"
        placeholder="6">
        
      <button 
        class="continue-btn" 
        [disabled]="!selectedAge"
        (click)="continue()">
        Enter Dream World
      </button>
    </div>
  </div>
</div>
